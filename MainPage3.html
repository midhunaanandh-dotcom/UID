<!DOCTYPE html>
<html>
<head>
    <title>Desi Safari</title>
    <style>
        body {
            background-color: #fdfae6;
            margin: 0;
            padding: 0;
        }
        /* Sticky Image Section */
        .hero {
            position: sticky;
            top: 0;
            z-index: 1;
            width: 100%;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fdfae6;
        }
        .hero img {
            width: 90%;
            height: 75vh;
            object-fit: cover;
            border-radius: 40px;
        }
        /* Overlapping Content */
        .overlay {
            position: relative;
            z-index: 10;
            background-color: #fdfae6;
            text-align: center;
        }
        .title {
            position: relative;
            display: inline-block;
            margin-top: -30px;
            font-family: "Times New Roman", serif;
            font-size: 13vw;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #A0522D;
        }
        /* Content Section */
        .content {
            max-width: 800px;
            margin: 0 auto;
            padding: 50px 20px;
            font-family: system-ui, -apple-system, sans-serif;
            color: #333;
        }
        .content h2 {
            font-size: 2.5rem;
            border-bottom: 2px solid #8B4513;
            display: inline-block;
            padding-bottom: 10px;
            font-family: "Times New Roman", serif;
        }
        .content p {
            font-size: 1.2rem;
            line-height: 1.8;
        }
        .spacer {
            height: 800px;
        }
    </style>
</head>
<body>
    <!-- Sticky Image -->
    <div class="hero">
        <img src="D:\Samyuktha_Amrita\SEM2\HTML\PROJECT\tomb.jpeg" alt="Humayun's Tomb">
    </div>
    <!-- Overlay Section -->
    <div class="overlay">
        <div class="title">
            DESI SAFARI
        </div>
        <div class="content">
            <h2>The Heritage Journey</h2>
            <p>Ready to walk through the roots and routes of India?</p>

            <div class="spacer"></div>
        </div>

    </div>

</body>
</html>
